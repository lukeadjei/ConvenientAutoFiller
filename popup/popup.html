<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFiller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="container">

    <!-- Header bar -->
    <header>
      <div class="header-content">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h1>AutoFiller</h1>
      </div>
    </header>

    <!-- Main content -->
    <main>

      <!-- Site selector dropdown -->
      <div class="field-group">
        <label for="site-select">Site</label>
        <div class="select-wrapper">
          <select id="site-select"></select>
          <!-- The arrow icon is added via CSS so we don't need it in HTML -->
        </div>
      </div>

      <!-- Credential form -->
      <!-- novalidate disables browser's built-in validation bubbles, we handle feedback ourselves -->
      <form id="credential-form" novalidate>

        <div class="field-group">
          <label for="username-input">Username</label>
          <input
            type="text"
            id="username-input"
            placeholder="Enter username or ID"
            autocomplete="off"
            spellcheck="false"
          >
        </div>

        <div class="field-group">
          <label for="password-input">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password-input"
              placeholder="Enter password"
              autocomplete="new-password"
            >
            <!-- Toggle button to show/hide password -->
            <button type="button" id="toggle-password" class="icon-btn" title="Toggle visibility">
              <!-- Eye icon (visible by default — means password is currently hidden) -->
              <svg id="icon-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-slash icon (hidden by default — shown when password is visible) -->
              <svg id="icon-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="button-row">
          <button type="submit" id="save-btn" class="btn btn-primary">Save</button>
          <button type="button" id="clear-btn" class="btn btn-secondary">Clear</button>
        </div>

      </form>
    </main>

    <!-- Toast notification — briefly shows "Saved!" or "Cleared." feedback -->
    <!-- aria-live="polite" makes it accessible to screen readers too -->
    <div id="toast" class="toast" aria-live="polite"></div>

  </div>

  <!--
    Script load order matters here:
    1. sites.js must load first so SITE_CONFIGS is available
    2. popup.js loads second and uses SITE_CONFIGS immediately
  -->
  <script src="../config/sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
